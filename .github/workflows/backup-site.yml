name: Backup site files

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python backup_site.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
